<div class="log-viewer" part="viewer">
  <div class="log-viewer__backdrop" part="backdrop"></div>
  <div class="log-viewer__panel" part="panel">
    <div class="log-viewer__header">
      <h2 class="log-viewer__title">Logs</h2>
      <button type="button" class="log-viewer__icon-btn log-viewer__icon-btn--close" part="close" aria-label="Close" title="Close"></button>
    </div>
    <div class="log-viewer__toolbar">
      <div class="log-viewer__filters">
        <label class="log-viewer__filter" title="Info"><input type="checkbox" data-level="info" checked /><span class="log-viewer__filter-key">I</span></label>
        <label class="log-viewer__filter" title="OK"><input type="checkbox" data-level="ok" checked /><span class="log-viewer__filter-key">O</span></label>
        <label class="log-viewer__filter" title="Warn"><input type="checkbox" data-level="warn" checked /><span class="log-viewer__filter-key">W</span></label>
        <label class="log-viewer__filter" title="Fail"><input type="checkbox" data-level="fail" checked /><span class="log-viewer__filter-key">F</span></label>
        <label class="log-viewer__filter" title="Debug"><input type="checkbox" data-level="debug" /><span class="log-viewer__filter-key">D</span></label>
      </div>
      <input type="text" class="log-viewer__search" part="search" placeholder="Filter…" title="Search [boot], ModuleLoad, preset-ui… — enable D for debug" />
      <div class="log-viewer__actions">
        <button type="button" class="log-viewer__icon-btn" data-action="copy" aria-label="Copy filtered logs" title="Copy visible logs (respects filters &amp; search)"></button>
        <button
          type="button"
          class="log-viewer__icon-btn"
          data-action="include-previous"
          aria-label="Include previous sessions"
          title="Include logs from previous sessions"
        ></button>
        <button type="button" class="log-viewer__icon-btn" data-action="clear" aria-label="Clear all logs" title="Clear all stored logs"></button>
      </div>
    </div>
    <div class="log-viewer__list" part="list"></div>
    <div class="log-viewer__footer" part="footer">
      <label class="log-viewer__persist">
        <span class="log-viewer__persist-text">
          <span class="log-viewer__persist-label">Persist logs</span>
          <span class="log-viewer__persist-hint">IndexedDB · this site only</span>
        </span>
        <span class="log-viewer__switch" aria-hidden="true">
          <input type="checkbox" class="log-viewer__persist-input" data-action="persist" role="switch" />
          <span class="log-viewer__switch-track"></span>
          <span class="log-viewer__switch-thumb"></span>
        </span>
      </label>
    </div>
  </div>
</div>
