<div class="corner-widget">
  <div class="corner-widget__card">
    <div class="corner-widget__header" part="header">
      <div class="corner-widget__drag" title="Drag to move" aria-hidden="true"></div>
      <div class="corner-widget__brand" part="brand" role="button" tabindex="0" aria-label="Open MagickMonkey menu">
        <div class="corner-widget__logo" part="logo" role="img" aria-hidden="true"></div>
        <span class="corner-widget__title">MagickMonkey</span>
      </div>
      <button class="corner-widget__hide" part="hide" type="button" title="Hide (show again after refresh)" aria-label="Hide widget"></button>
    </div>

    <div class="corner-widget__panel" part="panel">
      <div class="corner-widget__list-shell vws-scroll-indicator-shell">
        <ul class="corner-widget__list vws-scroll-indicator-scroller" part="list"></ul>
        <div class="vws-scroll-indicator-track" aria-hidden="true">
          <span class="vws-scroll-indicator-thumb"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="corner-widget__dock" part="dock"></div>
</div>
