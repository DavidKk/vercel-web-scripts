<!-- Highlight box (single, follows current highlighted node) -->
<div class="node-selector-highlight" part="highlight"></div>

<!-- Close button (exit selection mode) -->
<button type="button" class="node-selector-close" part="close" aria-label="Close node selector" title="Close"></button>

<!-- Markers container (all marker UIs are inserted here) -->
<div class="node-selector-markers" part="markers"></div>
